{% extends 'transactions/base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <!-- Kategoriya qo'shish -->
        <div class="card p-4 mb-3">
            <h6 class="fw-bold mb-3">
                <i class="fas fa-tag me-2 text-primary"></i>Yangi kategoriya qo'shish
            </h6>
            <form method="POST" action="{% url 'add_category' %}">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <input type="text" name="name" class="form-control"
                           placeholder="Kategoriya nomi (masalan: Oziq-ovqat)">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </form>
        </div>

        <!-- Tranzaksiya qo'shish -->
        <div class="card p-4">
            <h5 class="fw-bold mb-4">
                <i class="fas fa-plus-circle me-2 text-primary"></i>Yangi Tranzaksiya
            </h5>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nomi</label>
                    {{ form.title }}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Miqdor (so'm)</label>
                    {{ form.amount }}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Turi</label>
                    {{ form.type }}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Kategoriya</label>
                    {{ form.category }}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Izoh</label>
                    {{ form.description }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-save me-1"></i> Saqlash
                    </button>
                    <a href="{% url 'index' %}" class="btn btn-outline-secondary w-100">
                        <i class="fas fa-times me-1"></i> Bekor
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>

{% endblock %}
