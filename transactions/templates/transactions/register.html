<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
                    <h4 class="fw-bold">Ro'yxatdan o'tish</h4>
                    <p class="text-muted">Yangi hisob yarating</p>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    {% if form.errors %}
                    <div class="alert alert-danger">
                        Xato! Ma'lumotlarni tekshiring.
                    </div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Ismingiz</label>
                        {{ form.first_name }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        {{ form.email }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Parol</label>
                        {{ form.password }}
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Parolni tasdiqlang</label>
                        {{ form.password2 }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
