<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim-Chiqim Nazorat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; }
        .sidebar { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; }
        .sidebar a { display: block; padding: 10px 15px; border-radius: 10px; color: #555; text-decoration: none; margin-bottom: 5px; }
        .sidebar a:hover { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .sidebar a.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
    <a class="navbar-brand fw-bold fs-4" href="{% url 'index' %}">
        <i class="fas fa-wallet me-2"></i>Finance Nazorat
    </a>
    {% if user.is_authenticated %}
    <div class="d-flex align-items-center gap-3">
        <a href="{% url 'profile' %}" class="d-flex align-items-center gap-2 text-white text-decoration-none">
            {% if user.profile.avatar %}
            <img src="{{ user.profile.avatar.url }}"
                 style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.5);">
            {% else %}
            <div style="width:36px;height:36px;border-radius:50%;
                        background:rgba(255,255,255,0.2);
                        display:flex;align-items:center;justify-content:center;">
                <i class="fas fa-user"></i>
            </div>
            {% endif %}
            <span>{{ user.first_name|default:user.username }}</span>
        </a>
        <form method="POST" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">
                <i class="fas fa-sign-out-alt me-1"></i>Chiqish
            </button>
        </form>
    </div>
    {% endif %}
</nav>

<div class="container-fluid mt-4 px-4">
    <div class="row">

        <!-- SIDEBAR -->
        {% if user.is_authenticated %}
        <div class="col-md-2 mb-4">
            <div class="sidebar">
                <a href="{% url 'index' %}">
                    <i class="fas fa-home me-2"></i>Bosh sahifa
                </a>
                <a href="{% url 'add_transaction' %}">
                    <i class="fas fa-plus me-2"></i>Qo'shish
                </a>
                <a href="{% url 'cards' %}">
                    <i class="fas fa-credit-card me-2"></i>Kartalar
                </a>
                <a href="{% url 'profile' %}">
                    <i class="fas fa-user me-2"></i>Profil
                </a>
            </div>
        </div>
        {% endif %}

        <!-- ASOSIY KONTENT -->
        <div class="col-md-10">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
