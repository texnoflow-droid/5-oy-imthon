<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-wallet fa-3x text-primary mb-3"></i>
                    <h4 class="fw-bold">Finance Nazorat</h4>
                    <p class="text-muted">Hisobingizga kiring</p>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Foydalanuvchi nomi</label>
                        <input type="text" name="username" class="form-control" placeholder="Username">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Parol</label>
                        <input type="password" name="password" class="form-control" placeholder="Parol">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-sign-in-alt me-2"></i>Kirish
                    </button>
                    <div class="text-center mt-3">
    <a href="{% url 'register' %}" class="text-muted">
        Hisobingiz yo'qmi? Ro'yxatdan o'ting
    </a>
</div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
